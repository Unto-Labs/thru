abi:
  package: thru.program.name_service
  name: "Name Service"
  abi-version: 1
  package-version: "0.1.0"
  description: ABI for the Thru name service program instruction envelopes and account state
  imports: []
  options:
    program-metadata:
      root-types:
        instruction-root: "NameServiceInstruction"
        account-root: "NameServiceAccount"
        errors: "NameServiceError"
types:
- name: Pubkey
  kind:
    struct:
      packed: true
      fields:
      - name: bytes
        field-type:
          array:
            size:
              literal:
                u64: 32
            element-type:
              primitive: u8
- name: KvRecord
  kind:
    struct:
      packed: true
      fields:
      - name: key_length
        field-type:
          primitive: u32
      - name: key
        field-type:
          array:
            size:
              literal:
                u64: 32
            element-type:
              primitive: u8
      - name: value_length
        field-type:
          primitive: u32
      - name: value
        field-type:
          array:
            size:
              literal:
                u64: 256
            element-type:
              primitive: u8
- name: RootRegistrar
  kind:
    struct:
      packed: true
      fields:
      - name: authority
        field-type:
          type-ref:
            name: Pubkey
      - name: root_name
        field-type:
          array:
            size:
              literal:
                u64: 64
            element-type:
              primitive: u8
      - name: root_name_length
        field-type:
          primitive: u32
      - name: total_subdomains
        field-type:
          primitive: u64
- name: Domain
  kind:
    struct:
      packed: true
      fields:
      - name: parent
        field-type:
          type-ref:
            name: Pubkey
      - name: owner
        field-type:
          type-ref:
            name: Pubkey
      - name: name
        field-type:
          array:
            size:
              literal:
                u64: 64
            element-type:
              primitive: u8
      - name: name_length
        field-type:
          primitive: u32
      - name: registration_time
        field-type:
          primitive: u64
      - name: record_count
        field-type:
          primitive: u32
      - name: records
        field-type:
          array:
            size:
              field-ref:
                path: ["record_count"]
            element-type:
              type-ref:
                name: KvRecord
- name: NameServiceAccount
  kind:
    struct:
      packed: true
      fields:
      - name: data
        field-type:
          size-discriminated-union:
            packed: true
            variants:
            - name: root_registrar
              expected-size: 108
              variant-type:
                type-ref:
                  name: RootRegistrar
            - name: domain
              expected-size: 144
              variant-type:
                type-ref:
                  name: Domain
- name: InitializeRootArgs
  kind:
    struct:
      packed: true
      fields:
      - name: registrar_account_idx
        field-type:
          primitive: u16
      - name: authority_account_idx
        field-type:
          primitive: u16
      - name: root_name
        field-type:
          array:
            size:
              literal:
                u64: 64
            element-type:
              primitive: u8
      - name: root_name_length
        field-type:
          primitive: u32
- name: RegisterSubdomainArgs
  kind:
    struct:
      packed: true
      fields:
      - name: domain_account_idx
        field-type:
          primitive: u16
      - name: parent_account_idx
        field-type:
          primitive: u16
      - name: owner_account_idx
        field-type:
          primitive: u16
      - name: authority_account_idx
        field-type:
          primitive: u16
      - name: name
        field-type:
          array:
            size:
              literal:
                u64: 64
            element-type:
              primitive: u8
      - name: name_length
        field-type:
          primitive: u32
- name: AppendRecordArgs
  kind:
    struct:
      packed: true
      fields:
      - name: domain_account_idx
        field-type:
          primitive: u16
      - name: owner_account_idx
        field-type:
          primitive: u16
      - name: key_length
        field-type:
          primitive: u32
      - name: key
        field-type:
          array:
            size:
              literal:
                u64: 32
            element-type:
              primitive: u8
      - name: value_length
        field-type:
          primitive: u32
      - name: value
        field-type:
          array:
            size:
              literal:
                u64: 256
            element-type:
              primitive: u8
- name: DeleteRecordArgs
  kind:
    struct:
      packed: true
      fields:
      - name: domain_account_idx
        field-type:
          primitive: u16
      - name: owner_account_idx
        field-type:
          primitive: u16
      - name: key_length
        field-type:
          primitive: u32
      - name: key
        field-type:
          array:
            size:
              literal:
                u64: 32
            element-type:
              primitive: u8
- name: UnregisterArgs
  kind:
    struct:
      packed: true
      fields:
      - name: domain_account_idx
        field-type:
          primitive: u16
      - name: owner_account_idx
        field-type:
          primitive: u16
- name: NameServiceInstruction
  kind:
    struct:
      packed: true
      fields:
      - name: tag
        field-type:
          primitive: u32
      - name: payload
        field-type:
          enum:
            packed: true
            tag-ref:
              field-ref:
                path:
                - tag
            variants:
            - name: initialize_root
              tag-value: 0
              variant-type:
                type-ref:
                  name: InitializeRootArgs
            - name: register_subdomain
              tag-value: 1
              variant-type:
                type-ref:
                  name: RegisterSubdomainArgs
            - name: append_record
              tag-value: 2
              variant-type:
                type-ref:
                  name: AppendRecordArgs
            - name: delete_record
              tag-value: 3
              variant-type:
                type-ref:
                  name: DeleteRecordArgs
            - name: unregister
              tag-value: 4
              variant-type:
                type-ref:
                  name: UnregisterArgs
- name: NameServiceError
  kind:
    struct:
      packed: true
      fields:
      - name: code
        field-type:
          primitive: u64
