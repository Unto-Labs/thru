abi:
  package: thru.program.thru_registrar
  name: "Thru Registrar"
  abi-version: 1
  package-version: "0.1.0"
  description: ABI for the Thru registrar program instruction envelopes and account state
  imports: []
  options:
    program-metadata:
      root-types:
        instruction-root: "ThruRegistrarInstruction"
        account-root: "ThruRegistrarAccount"
        errors: "ThruRegistrarError"
types:
- name: Pubkey
  kind:
    struct:
      packed: true
      fields:
      - name: bytes
        field-type:
          array:
            size:
              literal:
