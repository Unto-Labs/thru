            element-type:
              primitive: u8
      - name: domain_name_length
        field-type:
          primitive: u32
      - name: lease_start_time
        field-type:
          primitive: u64
      - name: lease_end_time
        field-type:
          primitive: u64
- name: ThruRegistrarAccount
  kind:
    struct:
      packed: true
      fields:
      - name: data
        field-type:
          size-discriminated-union:
            packed: true
            variants:
            - name: lease
              expected-size: 148
              variant-type:
                type-ref:
                  name: Lease
            - name: config
              expected-size: 244
