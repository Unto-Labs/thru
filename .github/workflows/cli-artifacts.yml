name: Thru CLI Artifacts

# Builds the thru CLI binaries, attaches them to the GitHub release, and
# publishes the CLI npm packages. This is deliberately separate from
# release.yml: npm publishing only needs the CLI binaries + checksums, so it
# must not be gated on (or poll for) the slower SDK/toolchain artifact jobs.
# Within this workflow `needs:` replaces polling entirely — publish-npm
# consumes the artifacts built in the same run.
#
# This workflow also runs in the public mirror repo (Unto-Labs/thru), so the
# same assets are publicly downloadable from its releases without
# authentication. Only the thru-net run publishes npm (NPM_TOKEN lives there);
# the mirror run stops at the repository guard.

on:
  release:
    types: [published]
  # Manual runs rebuild the thru CLI binaries for an existing release tag
  # (e.g. to retry a failed platform leg, reproduce a binary, or re-run a
  # failed npm publish — the publish steps are idempotent).
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build thru CLI artifacts for (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  # Build thru CLI binaries for the npm platform packages and for direct
  # download. Asset platform names must match SUPPORTED_PLATFORMS in
  # web/packages/cli/scripts/platform.mjs.
  build-cli-artifacts:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    # Windows support is best-effort for now: a failed Windows build must not
    # block the release or the npm publish of the other platforms.
    continue-on-error: ${{ matrix.best_effort || false }}
    env:
      TAG_NAME: ${{ github.event.release.tag_name || inputs.tag }}
      # Linux portability toolchain pins (see cli-cloud-vm-portability-plan.md).
      # zig sha256 is for the x86_64-linux tarball, from
      # https://ziglang.org/download/index.json — update it when bumping
      # ZIG_VERSION.
      ZIG_VERSION: "0.16.0"
      ZIG_SHA256: "70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00"
      CARGO_ZIGBUILD_VERSION: "0.22.3"
    strategy:
      fail-fast: false
      matrix:
        # glibc_floor: Linux binaries are linked against this glibc version
        # via cargo-zigbuild so they run on older cloud distros (Ubuntu 22.04
        # = 2.35, RHEL/Rocky 9 and Amazon Linux 2023 = 2.34, CentOS 7 = 2.17).
        # Building plain gnu targets on the Ubuntu 24.04 runner stamps a
        # glibc 2.39 floor, which fails to launch on all of the above.
        include:
          - os: ubuntu-large
            target: x86_64-unknown-linux-gnu
            glibc_floor: "2.17"
            asset_platform: Linux-x86_64
          - os: ubuntu-large
            target: aarch64-unknown-linux-gnu
            glibc_floor: "2.17"
            asset_platform: Linux-aarch64
          - os: macos-latest-xlarge
            target: aarch64-apple-darwin
            asset_platform: Darwin-arm64
          - os: macos-latest-xlarge
            target: x86_64-apple-darwin
            asset_platform: Darwin-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_platform: Windows-x86_64
            best_effort: true

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        # On release events this resolves to the tagged commit anyway; on
        # workflow_dispatch it pins the build to the requested release tag.
        ref: ${{ github.event.release.tag_name || inputs.tag }}
        # The CLI workspace only needs rpc/; skipping submodules keeps this
        # job fast and Windows-safe, and matches the public mirror layout
        # (which has no submodules at all).
        submodules: false
        fetch-depth: 0

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88.0
      with:
        targets: ${{ matrix.target }}

    - name: Set up Buf CLI
      # thru-grpc-client's build.rs shells out to `buf build` to generate the
      # proto descriptor set; without buf on PATH the cargo build fails on
      # every target with "buf is not installed".
      uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1
      with:
        setup_only: true

    - name: Install build dependencies
      if: ${{ runner.os == 'Linux' }}
      run: |
        .github/scripts/apt-install-with-retry.sh build-essential pkg-config libssl-dev libclang-dev

    # zig provides the linker and glibc stubs for both Linux targets, so no
    # distro cross toolchain (gcc-aarch64-linux-gnu) is needed. zig is
    # downloaded straight from ziglang.org and checksum-verified instead of
    # going through a third-party setup action.
    - name: Set up Zig and cargo-zigbuild
      if: ${{ matrix.glibc_floor != '' }}
      run: |
        set -euo pipefail

        ZIG_DIR="zig-x86_64-linux-${ZIG_VERSION}"
        curl -fsSL --retry 5 --retry-delay 5 -O "https://ziglang.org/download/${ZIG_VERSION}/${ZIG_DIR}.tar.xz"
        echo "${ZIG_SHA256}  ${ZIG_DIR}.tar.xz" | sha256sum -c -
        sudo tar -xJf "${ZIG_DIR}.tar.xz" -C /opt
        rm "${ZIG_DIR}.tar.xz"
        echo "/opt/${ZIG_DIR}" >> "$GITHUB_PATH"

        # --locked pins cargo-zigbuild's own dependency tree; crates.io
        # checksums cover the source. A couple of minutes per leg is
        # acceptable for a release build.
        cargo install cargo-zigbuild --locked --version "${CARGO_ZIGBUILD_VERSION}"

    - name: Cache cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-${{ matrix.target }}-cli-cargo-registry-rust-1.88-${{ hashFiles('rpc/cli/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.target }}-cli-cargo-registry-rust-1.88-

    - name: Cache cargo index
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-${{ matrix.target }}-cli-cargo-index-rust-1.88-${{ hashFiles('rpc/cli/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.target }}-cli-cargo-index-rust-1.88-

    # The zig segment keeps zig-linked and gcc-linked object files from
    # sharing a cache; bumping ZIG_VERSION rolls the key over.
    - name: Cache target directory
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: rpc/cli/target
        key: ${{ runner.os }}-${{ matrix.target }}-cli-cargo-target-rust-1.88-${{ matrix.glibc_floor && format('zig{0}-glibc{1}-', env.ZIG_VERSION, matrix.glibc_floor) || '' }}${{ hashFiles('rpc/cli/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.target }}-cli-cargo-target-rust-1.88-${{ matrix.glibc_floor && format('zig{0}-glibc{1}-', env.ZIG_VERSION, matrix.glibc_floor) || '' }}

    # Same convention as crates-publish.yml: the workspace crates stay at
    # 0.1.0 in the repo, so release builds must sync the manifests with the
    # release tag. This keeps CARGO_PKG_VERSION (used by version_check.rs
    # for update notifications and the user agent) aligned with the
    # published version. The intra-workspace thru-core requirement has to
    # move in lockstep or the path-dependency version check fails.
    - name: Sync crate versions with release
      shell: bash
      run: |
        set -euo pipefail

        VERSION="${TAG_NAME#v}"
        for manifest in rpc/cli/crates/*/Cargo.toml; do
          tmp="${manifest}.tmp"
          sed -E "s|^version = \"[^\"]+\"|version = \"${VERSION}\"|" "$manifest" > "$tmp" && mv "$tmp" "$manifest"
          sed -E "s|^thru-core = \{ version = \"[^\"]+\"|thru-core = { version = \"${VERSION}\"|" "$manifest" > "$tmp" && mv "$tmp" "$manifest"
        done

        # Materialize the version bump in Cargo.lock so the --locked build
        # below sees a consistent lockfile.
        cargo metadata --format-version 1 --manifest-path rpc/cli/Cargo.toml >/dev/null

        grep -H '^version = ' rpc/cli/crates/*/Cargo.toml

    - name: Build thru CLI binary
      shell: bash
      run: |
        # Stamp the release identity (same convention as crates-publish.yml).
        # Without this the get_version! macro falls back to inference, and
        # a mismatch would make released binaries report a -local version
        # like "0.1.0-local+75e7c6d0".
        export THRU_BUILD_VERSION="${TAG_NAME#v}+$(git rev-parse --short=8 HEAD)"
        export THRU_BUILD_CHANNEL=release
        echo "THRU_BUILD_VERSION=${THRU_BUILD_VERSION}"

        # Linux legs build with cargo-zigbuild and a glibc-suffixed target so
        # the binaries run on older distros (see the matrix comment). The
        # output path is unaffected: zigbuild writes to the plain triple
        # directory, rpc/cli/target/<target>/release/.
        if [ -n "${{ matrix.glibc_floor }}" ]; then
          cargo zigbuild --release --locked --target "${{ matrix.target }}.${{ matrix.glibc_floor }}" --manifest-path rpc/cli/Cargo.toml --bin thru
        else
          cargo build --release --locked --target "${{ matrix.target }}" --manifest-path rpc/cli/Cargo.toml --bin thru
        fi

    # Regression guard for the portability work: fail the leg if the binary's
    # glibc requirement ever creeps above the floor again (e.g. a runner image
    # bump combined with a zigbuild regression), or if a C dependency that is
    # supposed to be vendored/static (openssl, libgit2, libssh2, zlib) shows
    # up as a dynamic dependency. readelf is used instead of objdump because
    # it handles foreign-arch ELFs (the aarch64 leg is inspected on x86_64).
    - name: Assert glibc floor
      if: ${{ matrix.glibc_floor != '' }}
      shell: bash
      run: |
        set -euo pipefail

        BIN="rpc/cli/target/${{ matrix.target }}/release/thru"
        FLOOR="GLIBC_${{ matrix.glibc_floor }}"

        MAX_GLIBC="$(readelf -V "$BIN" | grep -oE 'GLIBC_2\.[0-9]+(\.[0-9]+)?' | sort -Vu | tail -1)"
        echo "Maximum glibc symbol version: ${MAX_GLIBC} (floor: ${FLOOR})"
        HIGHEST="$(printf '%s\n%s\n' "$MAX_GLIBC" "$FLOOR" | sort -V | tail -1)"
        if [ "$HIGHEST" != "$FLOOR" ]; then
          echo "::error::thru requires ${MAX_GLIBC}, above the ${FLOOR} floor; it would fail to launch on older distros." >&2
          exit 1
        fi

        echo "Dynamic dependencies:"
        readelf -d "$BIN" | grep NEEDED || true
        if readelf -d "$BIN" | grep NEEDED | grep -E 'libssl|libcrypto|libgit2|libssh2|libz\.so'; then
          echo "::error::Unexpected dynamic dependency; these libraries must stay vendored/statically linked for portability." >&2
          exit 1
        fi

    - name: Smoke test thru CLI binary
      # aarch64-linux is cross-compiled and cannot execute on the x86_64
      # runner; every other target runs natively (Darwin-x86_64 via Rosetta
      # on the arm64 macOS runners). The version assertion guards the
      # THRU_BUILD_VERSION stamping above: a binary that reports the
      # crate-default "0.1.0-local+..." must not ship.
      if: ${{ matrix.target != 'aarch64-unknown-linux-gnu' }}
      shell: bash
      run: |
        BIN_NAME="thru"
        if [ "${{ runner.os }}" = "Windows" ]; then
          BIN_NAME="thru.exe"
        fi

        VERSION_OUTPUT="$("rpc/cli/target/${{ matrix.target }}/release/${BIN_NAME}" --version)"
        echo "$VERSION_OUTPUT"
        case "$VERSION_OUTPUT" in
          *"${TAG_NAME#v}+"*) ;;
          *)
            echo "Binary reports '${VERSION_OUTPUT}', expected the release version ${TAG_NAME#v}." >&2
            exit 1
            ;;
        esac

    - name: Package thru CLI binary
      id: package-cli
      shell: bash
      run: |
        ASSET_NAME="thru-cli-${{ matrix.asset_platform }}-${TAG_NAME}"
        BIN_NAME="thru"
        if [ "${{ runner.os }}" = "Windows" ]; then
          BIN_NAME="thru.exe"
        fi

        mkdir -p "cli-artifacts/${ASSET_NAME}"
        cp "rpc/cli/target/${{ matrix.target }}/release/${BIN_NAME}" "cli-artifacts/${ASSET_NAME}/${BIN_NAME}"
        chmod 0755 "cli-artifacts/${ASSET_NAME}/${BIN_NAME}"
        tar -czf "cli-artifacts/${ASSET_NAME}.tar.gz" -C "cli-artifacts/${ASSET_NAME}" "${BIN_NAME}"

        echo "asset_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"

    - name: Upload thru CLI artifacts to workflow
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: cli-${{ matrix.asset_platform }}
        path: cli-artifacts/${{ steps.package-cli.outputs.asset_name }}.tar.gz
        retention-days: 90

  # Attach the CLI artifacts and checksums to the GitHub release.
  upload-cli-release-artifacts:
    needs: [build-cli-artifacts]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    outputs:
      release_exists: ${{ steps.release-check.outputs.exists }}
      packages_built: ${{ steps.build-packages.outputs.built }}
    env:
      TAG_NAME: ${{ github.event.release.tag_name || inputs.tag }}
      NFPM_PKG_VERSION: "2.46.3"

    steps:
    # Only needed for .github/nfpm/thru-cli.yaml; checkout must come first
    # because it cleans the workspace. The packaging step degrades to a
    # warning when the config is absent (workflow_dispatch against a tag
    # that predates deb/rpm packaging).
    - name: Checkout packaging config
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        ref: ${{ github.event.release.tag_name || inputs.tag }}
        submodules: false

    - name: Download thru CLI artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        path: cli-release-artifacts
        pattern: cli-*

    # .deb/.rpm packages are nFPM-wrapped copies of the Linux tarball
    # binaries, so cloud VMs without npm can `apt install ./thru_*.deb` or
    # `dnf install <release-url>.rpm` straight from the release assets.
    # nfpm is checksum-verified against its release manifest and pinned by
    # NFPM_PKG_VERSION.
    - name: Build thru .deb and .rpm packages
      id: build-packages
      run: |
        set -euo pipefail

        if [ ! -f .github/nfpm/thru-cli.yaml ]; then
          echo "::warning::.github/nfpm/thru-cli.yaml not present at ${TAG_NAME}; skipping .deb/.rpm packaging."
          echo "built=false" >> "$GITHUB_OUTPUT"
          mkdir -p cli-packages
          exit 0
        fi

        NFPM_TARBALL="nfpm_${NFPM_PKG_VERSION}_Linux_x86_64.tar.gz"
        curl -fsSL --retry 5 --retry-delay 5 -O "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_PKG_VERSION}/${NFPM_TARBALL}"
        curl -fsSL --retry 5 --retry-delay 5 -o nfpm-checksums.txt "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_PKG_VERSION}/checksums.txt"
        grep " ${NFPM_TARBALL}\$" nfpm-checksums.txt | sha256sum -c -
        mkdir -p "$HOME/.local/bin"
        tar -xzf "${NFPM_TARBALL}" -C "$HOME/.local/bin" nfpm
        rm "${NFPM_TARBALL}" nfpm-checksums.txt

        VERSION="${TAG_NAME#v}"
        mkdir -p cli-packages
        while read -r asset_platform nfpm_arch; do
          tarball="$(find cli-release-artifacts -type f -name "thru-cli-${asset_platform}-${TAG_NAME}.tar.gz" -print -quit)"
          if [ -z "$tarball" ]; then
            echo "::warning::No ${asset_platform} tarball in this run; skipping its .deb/.rpm."
            continue
          fi
          workdir="$(mktemp -d)"
          tar -xzf "$tarball" -C "$workdir"
          export NFPM_VERSION="$VERSION" NFPM_ARCH="$nfpm_arch" NFPM_BIN="$workdir/thru"
          "$HOME/.local/bin/nfpm" package -f .github/nfpm/thru-cli.yaml -p deb -t cli-packages/
          "$HOME/.local/bin/nfpm" package -f .github/nfpm/thru-cli.yaml -p rpm -t cli-packages/
        done <<'EOF'
        Linux-x86_64 amd64
        Linux-aarch64 arm64
        EOF

        ls -l cli-packages
        if [ -n "$(ls -A cli-packages)" ]; then
          echo "built=true" >> "$GITHUB_OUTPUT"
        else
          echo "built=false" >> "$GITHUB_OUTPUT"
        fi

    # Kept as a workflow artifact so test-linux-packages (and dispatch
    # dry-runs without a release) can consume the packages from this run.
    - name: Upload thru package artifacts to workflow
      if: ${{ steps.build-packages.outputs.built == 'true' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: cli-packages
        path: cli-packages/
        retention-days: 90
        if-no-files-found: error

    # The checksums file is scoped with a thru-cli- prefix because the
    # release hosts assets from several workflows; a bare SHA256SUMS that
    # only covers the CLI tarballs would be misleading next to them. It
    # covers the .deb/.rpm packages too, since they wrap the same binaries.
    - name: Create thru CLI checksums
      run: |
        set -euo pipefail

        : > cli-release-artifacts/thru-cli-SHA256SUMS
        while IFS= read -r file; do
          hash=$(sha256sum "$file" | awk '{print $1}')
          filename=$(basename "$file")
          printf '%s  %s\n' "$hash" "$filename" >> cli-release-artifacts/thru-cli-SHA256SUMS
        done < <( { find cli-release-artifacts/cli-* -type f -name 'thru-cli-*.tar.gz';
                    find cli-packages -type f \( -name '*.deb' -o -name '*.rpm' \); } | sort)

        cat cli-release-artifacts/thru-cli-SHA256SUMS

    # Also keep the checksums as a workflow artifact so publish-npm can
    # verify the binaries it consumes from this same run.
    - name: Upload thru CLI checksums to workflow
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: cli-SHA256SUMS
        path: cli-release-artifacts/thru-cli-SHA256SUMS
        retention-days: 90

    # On workflow_dispatch the requested tag may not have a release (e.g. a
    # dry-run build); keep the artifacts on the workflow run instead of
    # failing the upload. publish-npm also keys off this so dry-runs never
    # publish to npm.
    - name: Check release exists
      id: release-check
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if gh release view "${TAG_NAME}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "::warning::No release found for ${TAG_NAME}; CLI artifacts remain on this workflow run only."
        fi

    - name: Upload thru CLI artifacts
      if: ${{ steps.release-check.outputs.exists == 'true' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        for artifact_dir in cli-release-artifacts/cli-*; do
          if [ -d "$artifact_dir" ]; then
            echo "Processing $artifact_dir"
            for file in "$artifact_dir"/*; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                echo "Uploading $filename"
                gh release upload "${TAG_NAME}" "$file" --repo "${{ github.repository }}" --clobber
              fi
            done
          fi
        done

        for file in cli-packages/*.deb cli-packages/*.rpm; do
          if [ -f "$file" ]; then
            echo "Uploading $(basename "$file")"
            gh release upload "${TAG_NAME}" "$file" --repo "${{ github.repository }}" --clobber
          fi
        done

        gh release upload "${TAG_NAME}" cli-release-artifacts/thru-cli-SHA256SUMS --repo "${{ github.repository }}" --clobber

    - name: CLI Release Summary
      if: ${{ steps.release-check.outputs.exists == 'true' }}
      run: |
        echo "✅ Successfully uploaded thru CLI artifacts to release ${TAG_NAME}!"
        echo ""
        echo "thru CLI artifacts:"
        find cli-release-artifacts/cli-* cli-packages -type f -exec basename {} \; 2>/dev/null | sort || echo "  No CLI artifacts found"
        echo ""
        echo "Checksums:"
        cat cli-release-artifacts/thru-cli-SHA256SUMS

  # Install the freshly built .deb/.rpm in clean containers and run the
  # binary. This is the executable proof of the glibc 2.17 floor: all of
  # these distros ship a glibc older than the 24.04 build runner's (ubuntu
  # 22.04 = 2.35, debian 12 = 2.36, amazonlinux 2023 and rocky 9 = 2.34), so
  # the old un-zigbuilt binaries failed to even launch here. x86_64 only:
  # the runners cannot execute aarch64 binaries (that leg's floor is covered
  # by the readelf assertion in build-cli-artifacts).
  test-linux-packages:
    needs: [upload-cli-release-artifacts]
    if: ${{ needs.upload-cli-release-artifacts.outputs.packages_built == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ubuntu:22.04
            install: apt-get update -qq && apt-get install -qq -y /pkgs/thru_*_amd64.deb
          - image: ubuntu:24.04
            install: apt-get update -qq && apt-get install -qq -y /pkgs/thru_*_amd64.deb
          - image: debian:12
            install: apt-get update -qq && apt-get install -qq -y /pkgs/thru_*_amd64.deb
          - image: amazonlinux:2023
            install: dnf install -q -y /pkgs/thru-*.x86_64.rpm
          - image: rockylinux:9
            install: dnf install -q -y /pkgs/thru-*.x86_64.rpm

    steps:
      - name: Download thru package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: cli-packages
          path: cli-packages

      - name: Install package and run thru
        run: |
          set -euo pipefail

          docker run --rm -v "$PWD/cli-packages:/pkgs:ro" "${{ matrix.image }}" bash -c '
            set -euo pipefail
            ${{ matrix.install }}
            thru --version
          '

  # Publish the CLI npm packages: the platform packages carry the binaries
  # built in this run (npm selects the right one through os/cpu +
  # optionalDependencies — no postinstall, no network access at install time
  # beyond the npm registry), then `thru` itself. Guards:
  # - repository: only thru-net has NPM_TOKEN (the secrets context is not
  #   available in job-level `if`, so the repository name stands in for it);
  # - prerelease: never published to npm (release flag on release events, a
  #   `-` suffix in the tag on dispatch);
  # - release_exists: a dispatch dry-run for a tag without a release builds
  #   artifacts but must not publish.
  publish-npm:
    needs: [upload-cli-release-artifacts]
    if: >-
      ${{ github.repository == 'Unto-Labs/thru-net' &&
          needs.upload-cli-release-artifacts.outputs.release_exists == 'true' &&
          (github.event_name != 'release' || github.event.release.prerelease != true) &&
          (github.event_name != 'workflow_dispatch' || !contains(inputs.tag, '-')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TAG_NAME: ${{ github.event.release.tag_name || inputs.tag }}

    steps:
      - name: Determine release version
        id: meta
        run: |
          set -euo pipefail

          VERSION="${TAG_NAME#v}"
          if [ -z "$VERSION" ]; then
            echo "Unable to derive version from tag '$TAG_NAME'" >&2
            exit 1
          fi
          case "$VERSION" in
            *-*)
              echo "Refusing to publish prerelease version $VERSION to npm." >&2
              exit 1
              ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          # The CLI npm package is self-contained JS; no submodules needed.
          submodules: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Download thru CLI artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: cli-release-artifacts
          pattern: cli-*

      - name: Verify and extract thru CLI binaries
        run: |
          set -euo pipefail

          # The .deb/.rpm packages ride along (the cli-* artifact pattern
          # matches cli-packages) purely so the checksum verification below
          # covers every line of thru-cli-SHA256SUMS; npm packaging only
          # consumes the tarballs.
          mkdir -p cli-assets
          find cli-release-artifacts -type f \
            \( -name 'thru-cli-*.tar.gz' -o -name 'thru-cli-SHA256SUMS' \
               -o -name '*.deb' -o -name '*.rpm' \) \
            -exec mv {} cli-assets/ \;

          cd cli-assets
          sha256sum -c thru-cli-SHA256SUMS

          mkdir -p ../cli-binaries
          for archive in thru-cli-*.tar.gz; do
            base="${archive%.tar.gz}"
            asset_platform="${base#thru-cli-}"
            asset_platform="${asset_platform%-${TAG_NAME}}"
            mkdir -p "../cli-binaries/${asset_platform}"
            tar -xzf "$archive" -C "../cli-binaries/${asset_platform}"
          done

          echo "Extracted thru CLI binaries:"
          find ../cli-binaries -type f

      - name: Sync thru package version
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail

          tmp=$(mktemp)
          jq --arg v "$RELEASE_VERSION" '.version = $v' web/packages/cli/package.json > "$tmp"
          mv "$tmp" web/packages/cli/package.json
          echo "Set thru version to $RELEASE_VERSION"

      - name: Run thru package tests
        working-directory: web/packages/cli
        run: node --test

      - name: Generate thru platform packages
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          node web/packages/cli/scripts/make-platform-packages.mjs \
            --version "$RELEASE_VERSION" \
            --binaries-dir "$PWD/cli-binaries" \
            --out-dir web/packages/cli/npm \
            --optional win32-x64

      - name: Check packaging invariants
        working-directory: web/packages/cli
        run: node scripts/check-package.mjs

      # Platform packages must be live before `thru` itself is published so
      # that its optionalDependencies are resolvable the moment it appears.
      # Both publish steps are idempotent, so a dispatch re-run fills in
      # whatever a previous attempt missed.
      - name: Publish thru platform packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret is not configured." >&2
            exit 1
          fi

          for pkg_dir in web/packages/cli/npm/*/; do
            name=$(jq -r '.name' "${pkg_dir}package.json")
            version=$(jq -r '.version' "${pkg_dir}package.json")
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "Skipping ${name}@${version}: already published"
              continue
            fi
            echo "Publishing ${name}@${version}"
            npm publish "$pkg_dir" --access public
          done

      - name: Publish thru to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail

          if npm view "thru@${RELEASE_VERSION}" version >/dev/null 2>&1; then
            echo "Skipping thru@${RELEASE_VERSION}: already published"
            exit 0
          fi
          npm publish web/packages/cli --access public

      # End-to-end check of what consumers actually get: a fresh `npm exec`
      # must resolve thru@VERSION plus its linux-x64 platform package from
      # the public registry and run the native binary. The retry loop covers
      # registry propagation lag right after publish. Failures here cannot
      # unpublish anything, but they turn a broken release red immediately.
      - name: Verify published thru CLI
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail

          for attempt in $(seq 1 10); do
            if npm view "thru@${RELEASE_VERSION}" version >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" -eq 10 ]; then
              echo "thru@${RELEASE_VERSION} is not visible on the registry." >&2
              exit 1
            fi
            echo "Waiting for thru@${RELEASE_VERSION} on the registry (attempt ${attempt}/10)"
            sleep 30
          done

          cd "$(mktemp -d)"
          npm exec --yes --package "thru@${RELEASE_VERSION}" -- thru --version
