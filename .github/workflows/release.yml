name: Build Release Artifacts

on:
  release:
    types: [published]

permissions:
  contents: write
  actions: read

jobs:
  # Build SDK artifacts
  build-sdk-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TAG_NAME: ${{ github.event.release.tag_name }}
    strategy:
      matrix:
        sdk: [c]

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        submodules: true
        fetch-depth: 0

    - name: Create SDK artifact directory
      run: |
        mkdir -p sdk-artifact/thru-program-sdk-${{ matrix.sdk }}-${TAG_NAME}

    - name: Copy SDK-specific files
      run: |
        # Copy the entire SDK directory
        cp -rL sdks/${{ matrix.sdk }}/. sdk-artifact/thru-program-sdk-${{ matrix.sdk }}-${TAG_NAME}/

        # Ensure deps.sh and setup.sh are executable
        chmod +x sdk-artifact/thru-program-sdk-${{ matrix.sdk }}-${TAG_NAME}/deps.sh
        chmod +x sdk-artifact/thru-program-sdk-${{ matrix.sdk }}-${TAG_NAME}/setup.sh

    - name: Create tarball
      run: |
        cd sdk-artifact
        tar -czf thru-program-sdk-${{ matrix.sdk }}-${TAG_NAME}.tar.gz thru-program-sdk-${{ matrix.sdk }}-${TAG_NAME}/
        cd ..
        mv sdk-artifact/thru-program-sdk-${{ matrix.sdk }}-${TAG_NAME}.tar.gz .

    - name: Create zip archive
      run: |
        cd sdk-artifact
        zip -r thru-program-sdk-${{ matrix.sdk }}-${TAG_NAME}.zip thru-program-sdk-${{ matrix.sdk }}-${TAG_NAME}/
        cd ..
        mv sdk-artifact/thru-program-sdk-${{ matrix.sdk }}-${TAG_NAME}.zip .

    - name: Upload SDK artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: sdk-${{ matrix.sdk }}
        path: |
          thru-program-sdk-${{ matrix.sdk }}-${{ github.event.release.tag_name }}.tar.gz
          thru-program-sdk-${{ matrix.sdk }}-${{ github.event.release.tag_name }}.zip
        retention-days: 90

  # Build toolchain for Linux and macOS
  build-toolchain:
    permissions:
      contents: read
      actions: read
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    env:
      TAG_NAME: ${{ github.event.release.tag_name }}
      TN_SDK_BINARY_CACHE_DIR: ${{ github.workspace }}/.cache/thru-sdk-binary-cache
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-large, macos-latest-xlarge]
        include:
          - os: ubuntu-large
            arch: x86_64
          - os: macos-latest-xlarge
            arch: arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        submodules: true
        fetch-depth: 0

    - name: Compute SDK compiler cache key
      id: sdk-compiler-cache-key
      run: |
        export TN_SDK_DEPS_NO_MAIN=1
        source ./sdks/deps.sh
        echo "hash=$(host_compiler_cache_hash)" >> "$GITHUB_OUTPUT"

    - name: Cache local SDK binary cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: .cache/thru-sdk-binary-cache/
        key: thru-sdk-binary-${{ runner.os }}-${{ runner.arch }}-${{ steps.sdk-compiler-cache-key.outputs.hash }}-${{ hashFiles('sdks/deps.sh') }}
        restore-keys: |
          thru-sdk-binary-${{ runner.os }}-${{ runner.arch }}-${{ steps.sdk-compiler-cache-key.outputs.hash }}-

    - name: Cache .thru toolchain
      id: cache-toolchain
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: .thru/sdk/toolchain/
        key: thru-toolchain-c-${{ runner.os }}-${{ runner.arch }}-${{ steps.sdk-compiler-cache-key.outputs.hash }}-${{ hashFiles('sdks/deps.sh') }}
        restore-keys: |
          thru-toolchain-c-${{ runner.os }}-${{ runner.arch }}-${{ steps.sdk-compiler-cache-key.outputs.hash }}-

    - name: Update apt (Ubuntu only)
      if: ${{ matrix.os == 'ubuntu-large' }}
      run: |
        .github/scripts/apt-install-with-retry.sh --update-only

    - name: Ensure toolchain dependencies
      run: |
        if [[ ! -x "${GITHUB_WORKSPACE}/.thru/sdk/toolchain/bin/riscv64-unknown-elf-gcc" ]] ||
           [[ ! -x "${GITHUB_WORKSPACE}/.thru/sdk/toolchain/bin/riscv64-unknown-elf-g++" ]]; then
          TN_AUTO_INSTALL_PACKAGES=1 ./sdks/deps.sh --thru-dir "${GITHUB_WORKSPACE}" fetch check install-c
        fi
        rm -rf "${GITHUB_WORKSPACE}/.thru/sdk/toolchain/git"

    - name: Verify toolchain installation
      run: |
        export PATH="${GITHUB_WORKSPACE}/.thru/sdk/toolchain/bin:${PATH}"
        echo "${GITHUB_WORKSPACE}/.thru/sdk/toolchain/bin" >> $GITHUB_PATH
        command -v riscv64-unknown-elf-gcc
        command -v riscv64-unknown-elf-g++
        riscv64-unknown-elf-gcc --version
        riscv64-unknown-elf-g++ --version

    - name: Create minimal toolchain package
      run: |
        cd ${GITHUB_WORKSPACE}/.thru/sdk/

        # Detect OS and architecture
        OS_NAME=$(uname -s)
        ARCH_NAME=$(uname -m)

        # Create a minimal toolchain directory with the final archive name
        mkdir -p thru-toolchain-${OS_NAME}-${ARCH_NAME}-${TAG_NAME}

        # Copy only the essential directories
        for dir in bin include lib libexec picolibc riscv64-unknown-elf share; do
          if [ -d "toolchain/$dir" ]; then
            echo "Copying toolchain/$dir..."
            cp -r "toolchain/$dir" thru-toolchain-${OS_NAME}-${ARCH_NAME}-${TAG_NAME}/
          else
            echo "Warning: toolchain/$dir not found, skipping"
          fi
        done

        # Display what we're packaging
        echo "Toolchain package contents:"
        ls -la thru-toolchain-${OS_NAME}-${ARCH_NAME}-${TAG_NAME}/
        echo "Total size:"
        du -sh thru-toolchain-${OS_NAME}-${ARCH_NAME}-${TAG_NAME}/

    - name: Package toolchain as tar.gz
      run: |
        cd ${GITHUB_WORKSPACE}/.thru/sdk/
        OS_NAME=$(uname -s)
        ARCH_NAME=$(uname -m)
        tar -czf thru-toolchain-${OS_NAME}-${ARCH_NAME}-${TAG_NAME}.tar.gz thru-toolchain-${OS_NAME}-${ARCH_NAME}-${TAG_NAME}/
        ls -la thru-toolchain-${OS_NAME}-${ARCH_NAME}-${TAG_NAME}.tar.gz

    - name: Package toolchain as zip
      run: |
        cd ${GITHUB_WORKSPACE}/.thru/sdk/
        OS_NAME=$(uname -s)
        ARCH_NAME=$(uname -m)
        zip -r thru-toolchain-${OS_NAME}-${ARCH_NAME}-${TAG_NAME}.zip thru-toolchain-${OS_NAME}-${ARCH_NAME}-${TAG_NAME}/
        ls -la thru-toolchain-${OS_NAME}-${ARCH_NAME}-${TAG_NAME}.zip

    - name: Upload toolchain artifacts
      run: |
        OS_NAME=$(uname -s)
        ARCH_NAME=$(uname -m)
        echo "os_name=${OS_NAME}" >> $GITHUB_OUTPUT
        echo "arch_name=${ARCH_NAME}" >> $GITHUB_OUTPUT
      id: detect-platform

    - name: Upload toolchain artifacts to workflow
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: toolchain-${{ steps.detect-platform.outputs.os_name }}-${{ steps.detect-platform.outputs.arch_name }}
        path: |
          .thru/sdk/thru-toolchain-${{ steps.detect-platform.outputs.os_name }}-${{ steps.detect-platform.outputs.arch_name }}-${{ github.event.release.tag_name }}.tar.gz
          .thru/sdk/thru-toolchain-${{ steps.detect-platform.outputs.os_name }}-${{ steps.detect-platform.outputs.arch_name }}-${{ github.event.release.tag_name }}.zip
        retention-days: 90

  # Upload all artifacts to existing release
  upload-release-artifacts:
    needs: [build-sdk-artifacts, build-toolchain]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TAG_NAME: ${{ github.event.release.tag_name }}

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Download all artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        path: release-artifacts

    - name: Display downloaded artifacts
      run: |
        echo "Downloaded artifacts:"
        find release-artifacts -type f

    - name: Upload C SDK tar.gz
      uses: actions/upload-release-asset@e8f9f06c4b078e705bd2ea027f0926603fc9b4d5 # v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./release-artifacts/sdk-c/thru-program-sdk-c-${{ github.event.release.tag_name }}.tar.gz
        asset_name: thru-program-sdk-c-${{ github.event.release.tag_name }}.tar.gz
        asset_content_type: application/gzip

    - name: Upload C SDK zip
      uses: actions/upload-release-asset@e8f9f06c4b078e705bd2ea027f0926603fc9b4d5 # v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./release-artifacts/sdk-c/thru-program-sdk-c-${{ github.event.release.tag_name }}.zip
        asset_name: thru-program-sdk-c-${{ github.event.release.tag_name }}.zip
        asset_content_type: application/zip

    - name: Upload Toolchain artifacts
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Find all toolchain artifacts and upload them
        for artifact_dir in release-artifacts/toolchain-*; do
          if [ -d "$artifact_dir" ]; then
            echo "Processing $artifact_dir"
            for file in "$artifact_dir"/*; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                echo "Uploading $filename"

                # Determine content type
                if [[ "$filename" == *.tar.gz ]]; then
                  content_type="application/gzip"
                elif [[ "$filename" == *.zip ]]; then
                  content_type="application/zip"
                else
                  content_type="application/octet-stream"
                fi

                # Upload using GitHub CLI
                gh release upload "${TAG_NAME}" "$file" --repo "${{ github.repository }}" --clobber
              fi
            done
          fi
        done

    - name: Release Summary
      run: |
        echo "✅ Successfully uploaded artifacts to release ${TAG_NAME}!"
        echo ""
        echo "Uploaded artifacts:"
        echo "- C SDK (tar.gz, zip)"
        echo "- Toolchains for detected platforms (tar.gz, zip)"
        echo ""
        echo "Toolchain artifacts:"
        find release-artifacts/toolchain-* -type f -exec basename {} \; 2>/dev/null | sort || echo "  No toolchain artifacts found"
